<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barème immobilier - Oran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #f0f2f5; padding: 20px; }
        .card { max-width: 700px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result { font-size: 1.5rem; font-weight: bold; color: #198754; }
        .loading { display: none; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 0.8rem; overflow-x: auto; }
        #map { height: 300px; margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-body">
        <h3 class="card-title">Estimation immobilière - Wilaya d'Oran</h3>
        <p class="text-muted">Période biennale 2025-2026</p>

        <div id="map"></div>
        <p class="text-muted small mt-2">Cliquez sur un marqueur pour sélectionner la commune</p>

        <form id="estimationForm">
            <div class="mb-3">
                <label for="transactionType" class="form-label">Type de transaction</label>
                <select id="transactionType" class="form-select" required>
                    <option value="sale">Vente</option>
                    <option value="rent">Location</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="commune" class="form-label">Commune / Secteur</label>
                <select id="commune" class="form-select" required>
                    <option value="">Chargement...</option>
                </select>
                <div id="communeDescription" class="mt-2 text-muted" style="font-size:0.9rem; display:none;"></div>
            </div>

            <div class="mb-3">
                <label for="propertyType" class="form-label">Type de bien</label>
                <select id="propertyType" class="form-select" disabled required>
                    <option value="">Sélectionnez d'abord une commune</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Catégorie / Standing</label>
                <select id="category" class="form-select" disabled required>
                    <option value="">Sélectionnez d'abord un type</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="zone" class="form-label">Zone</label>
                <select id="zone" class="form-select" disabled required>
                    <option value="">Sélectionnez d'abord une catégorie</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="surface" class="form-label">Surface (m²)</label>
                <input type="number" id="surface" class="form-control" placeholder="Ex: 100" step="any" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-2">Estimer</button>
            <button type="button" id="debugBtn" class="btn btn-secondary w-100">Afficher les données brutes</button>
        </form>

        <div id="result" class="mt-4 text-center" style="display:none;">
            <h5>Estimation</h5>
            <div class="result" id="priceRange"></div>
            <div id="unitInfo" class="text-muted"></div>
            <div id="priceNote" class="text-info small"></div>
        </div>

        <div id="debugResult" class="mt-3" style="display:none;">
            <h6>Données brutes (JSON)</h6>
            <pre id="debugContent"></pre>
        </div>

        <div id="loading" class="text-center mt-3 loading">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Calcul en cours...</p>
        </div>

        <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Helper: replace underscores with spaces and convert to uppercase
    function formatLabel(str) {
        if (!str) return '';
        return str.replace(/_/g, ' ').toUpperCase();
    }

    // Exact coordinates for all communes
    const communeCoords = {
        "Oran_Partie_Est": [35.7067, -0.6120],
        "Oran_Partie_Ouest_et_Sud": [35.6890, -0.6558],
        "BIR_EL_DJIR": [35.7247, -0.5486],
        "HASSI_BOUNIF": [35.7055, -0.5113],
        "HASSI_BENOKBA": [35.7188, -0.4705],
        "GDYEL": [35.7801, -0.4286],
        "HASSI_MEFSOUKH": [35.8037, -0.3756],
        "BENFRAHA": [35.7275, -0.3364],
        "ARZEW": [35.8562, -0.3164],
        "SIDI_BENYABKA": [35.7885, -0.3402],
        "BETHIOUA": [35.8055, -0.2644],
        "MERS_ELHADJADJ": [35.7725, -0.1557],
        "AIN_EL_BIA": [35.8038, -0.2882],
        "AIN_TURCK": [35.7423, -0.7516],
        "MERS_EL_KEBIR": [35.7314, -0.7136],
        "BOUSFER": [35.7369, -0.8036],
        "EL_ANCOR": [35.7303, -0.8542],
        "ES_SENIA": [35.6447, -0.6273],
        "SIDI_CHAMI": [35.6586, -0.5565],
        "EL_KERMA": [35.5992, -0.5995],
        "BOUTLELIS": [35.5744, -0.9022],
        "MISSERGHINE": [35.6179, -0.7306],
        "AIN_EL_KERMA": [35.6806, -0.9567],
        "OUED_TLELAT": [35.5458, -0.4449],
        "EL_BRAYA": [35.6074, -0.5218],
        "BOUFATIS": [35.5583, -0.3551],
        "TAFRAOUI": [35.5262, -0.5369]
    };

    let currentTransaction = 'sale';
    let map;
    let markers = {};

    function initMap() {
        map = L.map('map').setView([35.7, -0.6], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
    }

    async function updateMarkers() {
        for (let key in markers) map.removeLayer(markers[key]);
        markers = {};

        const response = await fetch(`/api/communes?transaction_type=${currentTransaction}`);
        const communes = await response.json();

        for (let commune of communes) {
            const coords = communeCoords[commune];
            if (coords) {
                const marker = L.marker(coords).addTo(map);
                marker.bindPopup(`
                    <b>${formatLabel(commune)}</b><br>
                    Coordonnées: ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}<br>
                    <small>Cliquez pour sélectionner</small>
                `);
                marker.on('click', () => {
                    const select = document.getElementById('commune');
                    select.value = commune;
                    const event = new Event('change', { bubbles: true });
                    select.dispatchEvent(event);
                    map.setView(coords, 12);
                });
                markers[commune] = marker;
            }
        }
    }

    async function loadCommunes() {
        const response = await fetch(`/api/communes?transaction_type=${currentTransaction}`);
        const communes = await response.json();
        const select = document.getElementById('commune');
        select.innerHTML = '<option value="">Sélectionnez une commune</option>' +
            communes.map(c => `<option value="${c}">${formatLabel(c)}</option>`).join('');
        // Reset dependent fields
        document.getElementById('propertyType').innerHTML = '<option value="">Sélectionnez d\'abord une commune</option>';
        document.getElementById('propertyType').disabled = true;
        document.getElementById('category').innerHTML = '<option value="">Sélectionnez d\'abord un type</option>';
        document.getElementById('category').disabled = true;
        document.getElementById('zone').innerHTML = '<option value="">Sélectionnez d\'abord une catégorie</option>';
        document.getElementById('zone').disabled = true;
        document.getElementById('result').style.display = 'none';
        document.getElementById('debugResult').style.display = 'none';
        document.getElementById('communeDescription').style.display = 'none';

        await updateMarkers();
    }

    async function loadCommuneDescription() {
        const commune = document.getElementById('commune').value;
        if (!commune) {
            document.getElementById('communeDescription').style.display = 'none';
            return;
        }
        const response = await fetch(`/api/commune_description?commune=${encodeURIComponent(commune)}&transaction_type=${currentTransaction}`);
        const data = await response.json();
        const descDiv = document.getElementById('communeDescription');
        if (data.description) {
            descDiv.innerHTML = `<small>📌 ${data.description}</small>`;
            descDiv.style.display = 'block';
        } else {
            descDiv.style.display = 'none';
        }
    }

    async function loadPropertyTypes() {
        const commune = document.getElementById('commune').value;
        if (!commune) return;
        const response = await fetch(`/api/property_types?commune=${encodeURIComponent(commune)}&transaction_type=${currentTransaction}`);
        const types = await response.json();
        const select = document.getElementById('propertyType');
        select.disabled = false;
        select.innerHTML = '<option value="">Sélectionnez le type</option>' +
            types.map(t => `<option value="${t}">${formatLabel(t)}</option>`).join('');
        document.getElementById('category').innerHTML = '<option value="">Sélectionnez d\'abord un type</option>';
        document.getElementById('category').disabled = true;
        document.getElementById('zone').innerHTML = '<option value="">Sélectionnez d\'abord une catégorie</option>';
        document.getElementById('zone').disabled = true;
        document.getElementById('result').style.display = 'none';
        document.getElementById('debugResult').style.display = 'none';
    }

    async function loadCategories() {
        const commune = document.getElementById('commune').value;
        const propertyType = document.getElementById('propertyType').value;
        if (!commune || !propertyType) return;
        const response = await fetch(`/api/categories?commune=${encodeURIComponent(commune)}&transaction_type=${currentTransaction}&property_type=${encodeURIComponent(propertyType)}`);
        const categories = await response.json();
        const select = document.getElementById('category');
        select.disabled = false;
        select.innerHTML = '<option value="">Sélectionnez la catégorie</option>' +
            categories.map(c => `<option value="${c}">${formatLabel(c)}</option>`).join('');
        document.getElementById('zone').innerHTML = '<option value="">Sélectionnez d\'abord une catégorie</option>';
        document.getElementById('zone').disabled = true;
        document.getElementById('result').style.display = 'none';
        document.getElementById('debugResult').style.display = 'none';
    }

    async function loadZones() {
        const commune = document.getElementById('commune').value;
        const propertyType = document.getElementById('propertyType').value;
        const category = document.getElementById('category').value;
        if (!commune || !propertyType || !category) return;
        const response = await fetch(`/api/zones?commune=${encodeURIComponent(commune)}&transaction_type=${currentTransaction}&property_type=${encodeURIComponent(propertyType)}&category=${encodeURIComponent(category)}`);
        const zones = await response.json();
        const select = document.getElementById('zone');
        select.disabled = false;
        select.innerHTML = '<option value="">Sélectionnez la zone</option>' +
            zones.map(z => `<option value="${z}">${formatLabel(z)}</option>`).join('');
        document.getElementById('result').style.display = 'none';
        document.getElementById('debugResult').style.display = 'none';
    }

    async function fetchDebugData() {
        const commune = document.getElementById('commune').value;
        const propertyType = document.getElementById('propertyType').value;
        const category = document.getElementById('category').value;
        
        if (!commune || !propertyType || !category) {
            alert('Veuillez sélectionner une commune, un type et une catégorie.');
            return;
        }
        
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const debugDiv = document.getElementById('debugResult');
        loading.style.display = 'block';
        errorDiv.style.display = 'none';
        debugDiv.style.display = 'none';
        
        try {
            let url = `/api/debug?commune=${encodeURIComponent(commune)}&transaction_type=${currentTransaction}&property_type=${encodeURIComponent(propertyType)}&category=${encodeURIComponent(category)}`;
            const response = await fetch(url);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Erreur');
            }
            document.getElementById('debugContent').innerText = JSON.stringify(data, null, 2);
            debugDiv.style.display = 'block';
        } catch (err) {
            errorDiv.innerHTML = err.message;
            errorDiv.style.display = 'block';
        } finally {
            loading.style.display = 'none';
        }
    }

    document.getElementById('estimationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            commune: document.getElementById('commune').value,
            transaction_type: currentTransaction,
            property_type: document.getElementById('propertyType').value,
            category: document.getElementById('category').value,
            zone: document.getElementById('zone').value,
            surface: document.getElementById('surface').value
        };

        if (!data.commune || !data.property_type || !data.category || !data.zone || !data.surface) {
            alert('Veuillez remplir tous les champs.');
            return;
        }

        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');
        loading.style.display = 'block';
        errorDiv.style.display = 'none';
        resultDiv.style.display = 'none';

        try {
            const response = await fetch('/api/price', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || 'Erreur lors du calcul');
            }
            document.getElementById('priceRange').innerHTML = `${result.min.toLocaleString()} - ${result.max.toLocaleString()} ${result.unit}`;
            const unitInfo = document.getElementById('unitInfo');
            if (result.unit === "DA/mois") {
                unitInfo.innerHTML = `(Prix unitaire: ${result.min_per_unit} - ${result.max_per_unit} DA/m²/mois)`;
            } else {
                unitInfo.innerHTML = `(Prix unitaire: ${result.min_per_unit} - ${result.max_per_unit} ${result.unit_per})`;
            }
            document.getElementById('priceNote').innerHTML = result.note ? `<em>${result.note}</em>` : '';
            resultDiv.style.display = 'block';
        } catch (err) {
            errorDiv.innerHTML = err.message;
            errorDiv.style.display = 'block';
        } finally {
            loading.style.display = 'none';
        }
    });

    document.getElementById('commune').addEventListener('change', () => {
        loadPropertyTypes();
        loadCommuneDescription();
        const commune = document.getElementById('commune').value;
        if (commune && communeCoords[commune]) {
            map.setView(communeCoords[commune], 12);
        }
    });
    document.getElementById('propertyType').addEventListener('change', () => {
        loadCategories();
    });
    document.getElementById('category').addEventListener('change', () => {
        loadZones();
    });
    document.getElementById('transactionType').addEventListener('change', async (e) => {
        currentTransaction = e.target.value;
        await loadCommunes();
    });
    document.getElementById('debugBtn').addEventListener('click', fetchDebugData);

    initMap();
    loadCommunes();
</script>
</body>
</html>
